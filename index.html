<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mercado Libre Colombia - Compra Online</title>
    <link rel="stylesheet" href="./src/presentation/styles/main.css" />
  </head>
  <body>

    <!-- ══ NAVBAR (feature/luis/navbar) ══ -->
    <header class="ml-navbar" role="banner">
      <div class="ml-navbar__inner">
        <div class="ml-navbar__top">
          <a href="./index.html" class="ml-navbar__logo-link">
            <img
              src="./public/images/mercado-libre-logo.svg"
              alt="Mercado Libre Colombia - Inicio"
              class="ml-navbar__logo"
            />
          </a>

          <form class="ml-navbar__search" role="search" aria-label="Buscar productos">
            <input
              type="search"
              name="q"
              class="ml-navbar__search-input"
              placeholder="Buscar productos, marcas y más…"
              aria-label="Buscar productos, marcas y más"
            />
            <button type="submit" class="ml-navbar__search-button" aria-label="Buscar">
              <span class="ml-navbar__search-icon" aria-hidden="true"></span>
            </button>
          </form>

          <nav class="ml-navbar__account-nav" aria-label="Opciones de cuenta">
            <a href="#" class="ml-navbar__account-link">Crea tu cuenta</a>
            <a href="#" class="ml-navbar__account-link">Ingresa</a>
            <a href="#" class="ml-navbar__account-link">Mis compras</a>
          </nav>

          <button type="button" class="ml-navbar__cart" aria-label="Ver carrito">
            <span class="ml-navbar__cart-icon" aria-hidden="true"></span>
          </button>

          <button
            type="button"
            class="ml-navbar__menu-toggle"
            aria-label="Abrir menú de navegación"
            aria-expanded="false"
          >
            <span class="ml-navbar__menu-toggle-icon" aria-hidden="true"></span>
          </button>
        </div>

        <div class="ml-navbar__bottom">
          <button type="button" class="ml-navbar__location" aria-label="Seleccionar ubicación">
            <img
              src="./public/images/location.svg"
              alt=""
              class="ml-navbar__location-icon"
              aria-hidden="true"
            />
            <span class="ml-navbar__location-text">
              <span class="ml-navbar__location-label">Ingresa tu</span>
              <span class="ml-navbar__location-main">ubicación</span>
            </span>
          </button>

          <nav class="ml-navbar__menu" aria-label="Navegación principal">
            <ul class="ml-navbar__menu-list">
              <li class="ml-navbar__menu-item ml-navbar__menu-item--has-chevron">
                <a href="#" class="ml-navbar__menu-link">Categorías</a>
                <span class="ml-navbar__menu-chevron" aria-hidden="true">▾</span>
              </li>
              <li class="ml-navbar__menu-item">
                <a href="#" class="ml-navbar__menu-link">Ofertas</a>
              </li>
              <li class="ml-navbar__menu-item">
                <a href="#" class="ml-navbar__menu-link">Cupones</a>
              </li>
              <li class="ml-navbar__menu-item ml-navbar__menu-item--badge">
                <a href="#" class="ml-navbar__menu-link">Supermercado</a>
                <span class="ml-navbar__badge">NUEVO</span>
              </li>
              <li class="ml-navbar__menu-item">
                <a href="#" class="ml-navbar__menu-link">Moda</a>
              </li>
              <li class="ml-navbar__menu-item">
                <a href="#" class="ml-navbar__menu-link">Vender</a>
              </li>
              <li class="ml-navbar__menu-item">
                <a href="#" class="ml-navbar__menu-link">Ayuda / PQR</a>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </header>

    <!-- ══ PRODUCTOS (feature/matheu/ui-styles) ══ -->
    <main class="container">
      <div class="section-header">
        <h1 class="section-header__title">Ofertas del día</h1>
        <span class="section-header__subtitle">Productos seleccionados para vos</span>
      </div>

      <div id="product-grid" class="product-grid" aria-live="polite">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>

      <div id="error-msg" class="error-msg" hidden>
        <p>No se pudieron cargar los productos.</p>
        <button id="retry-btn" class="retry-btn">Reintentar</button>
      </div>
    </main>

    <script src="./src/presentation/scripts/main.js"></script>
  </body>
</html>
